<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <style>
    @keyframes pulse { 0%,100%{opacity:0.15} 50%{opacity:0.5} }
    .pulse { animation: pulse 2.4s ease-in-out infinite; }
  </style>

  <!-- Background hex -->
  <polygon points="50,4 92,28 92,72 50,96 8,72 8,28"
    fill="#080f0f" stroke="#00ffcc" stroke-width="2.5"/>

  <!-- Outer pulse ring -->
  <polygon class="pulse" points="50,1 95,26 95,74 50,99 5,74 5,26"
    fill="none" stroke="#00ffcc" stroke-width="1.2"/>

  <!-- Inner hex faint -->
  <polygon points="50,18 78,34 78,66 50,82 22,66 22,34"
    fill="none" stroke="#00ffcc" stroke-width="0.5" opacity="0.25"/>

  <!-- Corner dots -->
  <circle cx="8" cy="28" r="2.5" fill="#00ffcc" opacity="0.7"/>
  <circle cx="92" cy="28" r="2.5" fill="#00ffcc" opacity="0.7"/>
  <circle cx="8" cy="72" r="2.5" fill="#00ffcc" opacity="0.7"/>
  <circle cx="92" cy="72" r="2.5" fill="#00ffcc" opacity="0.7"/>
  <circle cx="50" cy="4" r="2.5" fill="#00ffcc" opacity="0.7"/>
  <circle cx="50" cy="96" r="2.5" fill="#00ffcc" opacity="0.7"/>

  <!-- Side circuit lines -->
  <line x1="8" y1="50" x2="22" y2="50" stroke="#00ffcc" stroke-width="0.8" opacity="0.35"/>
  <circle cx="22" cy="50" r="2" fill="#00ffcc" opacity="0.4"/>
  <line x1="92" y1="50" x2="78" y2="50" stroke="#00ffcc" stroke-width="0.8" opacity="0.35"/>
  <circle cx="78" cy="50" r="2" fill="#00ffcc" opacity="0.4"/>

  <!-- SHAFAY bold text -->
  <text x="50" y="56" text-anchor="middle"
    font-family="monospace" font-size="20" font-weight="900"
    fill="#00ffcc" letter-spacing="-0.5">SHAFAY</text>

  <!-- Underline -->
  <rect x="22" y="60" width="56" height="2" rx="1" fill="#00ffcc" opacity="0.3"/>

  <!-- shafay.dev small tag -->
  <text x="50" y="73" text-anchor="middle"
    font-family="monospace" font-size="5.5" font-weight="700"
    fill="#00ffcc" opacity="0.5" letter-spacing="1">shafay.dev</text>
</svg>
